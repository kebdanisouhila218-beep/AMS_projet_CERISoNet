<div class="online-users-bar">
  <span class="online-title">🟢 En ligne ({{ othersOnline.length }})</span>
  <div class="online-list">
    <ng-container *ngFor="let user of othersOnline">
      <span class="online-user">{{ user.pseudo }}</span>
    </ng-container>
    <span *ngIf="othersOnline.length === 0" class="no-users">Personne d'autre en ligne</span>
  </div>
</div>
